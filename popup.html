<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Asda List Exporter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main>
    <h1>Asda List Exporter</h1>
    <p class="hint">
      Open your Asda basket or shopping list, then click export.
    </p>

    <div class="buttons">
      <button id="exportButton">Export visible list</button>
      <button id="copyButton" disabled>Copy</button>
    </div>

    <label for="output">Output</label>
    <textarea id="output" placeholder="Your exported list will appear here..." readonly></textarea>

    <p id="status" role="status"></p>
  </main>

  <script src="popup.js"></script>
</body>
</html>
